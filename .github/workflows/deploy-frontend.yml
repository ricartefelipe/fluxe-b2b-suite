# Cloudflare Pages — produção (somente ramo master).
#
# Staging dos fronts está no Railway (ramo develop nos projetos Railway), ver docs/URLS-STAGING.md.
# Não dispare este workflow em develop: evita build duplicado sem deploy e mantém um destino claro por ramo.
#
# Pré-requisito: o workflow "CI" (deploy.yml) também corre em push para master quando mudam os mesmos
# caminhos em saas-suite-ui; validação completa (lint, test, e2e) fica lá. Aqui só: artefacto + wrangler.
name: Deploy Frontend

on:
  push:
    branches: [master]
    paths:
      - 'saas-suite-ui/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  cloudflare-pages:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: saas-suite-ui
    strategy:
      matrix:
        app:
          - name: shop
            project: fluxe-shop
            output: dist/apps/shop/browser
          - name: ops-portal
            project: fluxe-ops-portal
            output: dist/apps/ops-portal/browser
          - name: admin-console
            project: fluxe-admin-console
            output: dist/apps/admin-console/browser
    steps:
      - uses: actions/checkout@v4

      - name: Check Cloudflare configuration
        id: cf
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Cloudflare Pages omitido::Defina CLOUDFLARE_API_TOKEN e CLOUDFLARE_ACCOUNT_ID nos secrets para publicar."
          else
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: saas-suite-ui/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build ${{ matrix.app.name }} (production)
        run: pnpm nx build ${{ matrix.app.name }} --configuration=production

      - name: Inject runtime config (production)
        env:
          CORE_API_BASE_URL: ${{ vars.CORE_API_BASE_URL }}
          ORDERS_API_BASE_URL: ${{ vars.ORDERS_API_BASE_URL }}
          PAYMENTS_API_BASE_URL: ${{ vars.PAYMENTS_API_BASE_URL }}
          KEYCLOAK_URL: ${{ vars.KEYCLOAK_URL }}
          KEYCLOAK_REALM: ${{ vars.KEYCLOAK_REALM }}
          KEYCLOAK_CLIENT_ID: ${{ vars.KEYCLOAK_CLIENT_ID }}
        run: |
          OUTPUT_DIR="${{ matrix.app.output }}"
          cat > "${OUTPUT_DIR}/config.json" << CONF
          {
            "coreApiBaseUrl": "${CORE_API_BASE_URL:-https://api.fluxe.com.br}",
            "ordersApiBaseUrl": "${ORDERS_API_BASE_URL:-https://orders.fluxe.com.br}",
            "paymentsApiBaseUrl": "${PAYMENTS_API_BASE_URL:-https://payments.fluxe.com.br}"
          }
          CONF
          cat > "${OUTPUT_DIR}/config.keycloak.json" << KC
          {
            "url": "${KEYCLOAK_URL:-https://auth.fluxe.com.br}",
            "realm": "${KEYCLOAK_REALM:-fluxe}",
            "clientId": "${KEYCLOAK_CLIENT_ID:-${{ matrix.app.name }}}"
          }
          KC

      - name: Deploy to Cloudflare Pages
        if: steps.cf.outputs.deploy == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ${{ matrix.app.output }} --project-name=${{ matrix.app.project }} --branch=${{ github.ref_name }}
          workingDirectory: saas-suite-ui
