name: CI
on:
  push:
    branches: [master, develop]
    paths:
      - 'saas-suite-ui/**'
      - '.github/workflows/deploy.yml'
  pull_request:
    branches: [master, develop]
    paths:
      - 'saas-suite-ui/**'
      - '.github/workflows/deploy.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: saas-suite-ui
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: saas-suite-ui/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm nx run-many -t lint --projects=ops-portal,admin-console,shop

      - name: Test
        run: pnpm nx run-many -t test --projects=ops-portal,admin-console,shop

      - name: Build ops-portal
        run: pnpm nx build ops-portal --configuration=production

      - name: Build admin-console
        run: pnpm nx build admin-console --configuration=production

      - name: Build shop
        run: pnpm nx build shop --configuration=production
