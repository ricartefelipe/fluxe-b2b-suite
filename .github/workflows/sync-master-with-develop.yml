name: Sync master with develop

# Mantém master no mesmo commit que develop após cada push em develop
# (release continua a ser decisão humana; isto evita master ficar atrás).

on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: sync-master-with-develop
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Advance master to match develop
        run: |
          set -euo pipefail
          git fetch origin master develop
          git checkout master
          git reset --hard origin/develop
          git push origin master --force-with-lease
