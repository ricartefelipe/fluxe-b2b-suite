# Piloto HTTPS — gerado/ativado por scripts/aws-setup-tls-ec2.sh
# DOMAIN substituído no deploy (ex.: app.fluxe.com.br)

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name __FLUXE_DOMAIN__;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
    }

    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name __FLUXE_DOMAIN__;

    ssl_certificate     /etc/letsencrypt/live/__FLUXE_DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__FLUXE_DOMAIN__/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;

    resolver 127.0.0.11 valid=10s ipv6=off;

    location /api/core/ {
        set $upstream_saas_core saas-core:8080;
        rewrite ^/api/core/(.*)$ /$1 break;
        proxy_pass http://$upstream_saas_core;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location /api/orders/ {
        set $upstream_orders orders-api:3000;
        rewrite ^/api/orders/(.*)$ /$1 break;
        proxy_pass http://$upstream_orders;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location /api/payments/ {
        set $upstream_payments payments-api:8000;
        rewrite ^/api/payments/(.*)$ /$1 break;
        proxy_pass http://$upstream_payments;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;
        client_max_body_size 10m;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location /ops/ {
        set $upstream_ops ops-portal:80;
        rewrite ^/ops/(.*)$ /$1 break;
        proxy_pass http://$upstream_ops;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location /admin/ {
        set $upstream_admin admin-console:80;
        rewrite ^/admin/(.*)$ /$1 break;
        proxy_pass http://$upstream_admin;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location /health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    location / {
        set $upstream_shop shop-frontend:4000;
        proxy_pass http://$upstream_shop;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        $connection_upgrade;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
