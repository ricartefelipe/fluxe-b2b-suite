global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "spring-saas-core"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["saas-core:8080"]
        labels:
          service: "saas-core"

  - job_name: "node-b2b-orders"
    metrics_path: "/v1/metrics"
    static_configs:
      - targets: ["orders-api:3000"]
        labels:
          service: "orders-api"

  - job_name: "py-payments-ledger"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["payments-api:8000"]
        labels:
          service: "payments-api"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
