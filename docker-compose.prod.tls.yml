# TLS Let's Encrypt no piloto EC2 (Certbot + nginx :443).
# Ativar após DNS apontar para a EC2: scripts/aws-setup-tls-ec2.sh

services:
  nginx:
    ports: !override
      - "80:80"
      - "443:443"
    volumes: !override
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d/default-pilot-active.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro

  certbot:
    image: certbot/certbot:latest
    profiles: ["tls-tools"]
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: ["certbot"]

  certbot-renew:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint:
      - /bin/sh
      - -c
      - |
        trap exit TERM
        while :; do
          certbot renew --webroot -w /var/www/certbot --quiet || true
          sleep 12h & wait $$!
        done

volumes:
  certbot_conf:
  certbot_www:
