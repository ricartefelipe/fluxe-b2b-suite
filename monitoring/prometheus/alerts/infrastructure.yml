groups:
  - name: infrastructure
    interval: 30s
    rules:
      - alert: HighCPU
        expr: |
          (1 - avg by (instance) (rate(process_cpu_seconds_total[5m]))) * 100 < 20
        for: 10m
        labels:
          severity: warning
          team: infra
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage on {{ $labels.instance }} is above 80% for the last 10 minutes."

      - alert: HighMemory
        expr: |
          (process_resident_memory_bytes / process_virtual_memory_max_bytes) > 0.85
        for: 10m
        labels:
          severity: warning
          team: infra
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage on {{ $labels.instance }} is above 85%."

      - alert: DiskSpaceLow
        expr: |
          (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) < 0.15
        for: 5m
        labels:
          severity: critical
          team: infra
        annotations:
          summary: "Disk space low on {{ $labels.instance }}"
          description: "Less than 15% disk space remaining on {{ $labels.instance }} ({{ $labels.mountpoint }})."

      - alert: RabbitMQQueueBacklog
        expr: rabbitmq_queue_messages > 1000
        for: 5m
        labels:
          severity: warning
          team: infra
        annotations:
          summary: "RabbitMQ queue {{ $labels.queue }} has high backlog"
          description: "Queue {{ $labels.queue }} on {{ $labels.instance }} has {{ $value }} messages."

      - alert: PostgresConnections
        expr: |
          sum by (instance) (pg_stat_activity_count)
          /
          sum by (instance) (pg_settings_max_connections)
          > 0.80
        for: 5m
        labels:
          severity: warning
          team: infra
        annotations:
          summary: "PostgreSQL connection usage above 80%"
          description: "PostgreSQL on {{ $labels.instance }} is using {{ $value | humanizePercentage }} of max connections."

      - alert: RedisMemoryHigh
        expr: |
          redis_memory_used_bytes / redis_memory_max_bytes > 0.80
        for: 5m
        labels:
          severity: warning
          team: infra
        annotations:
          summary: "Redis memory usage above 80%"
          description: "Redis on {{ $labels.instance }} is using {{ $value | humanizePercentage }} of maxmemory."
