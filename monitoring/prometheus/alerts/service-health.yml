groups:
  - name: service-health
    interval: 30s
    rules:
      - alert: ServiceDown
        expr: up{job=~"saas-core|orders-api|payments-api"} == 0
        for: 1m
        labels:
          severity: critical
          team: platform
        annotations:
          summary: "{{ $labels.job }} is down"
          description: "Service {{ $labels.job }} (instance {{ $labels.instance }}) has been unreachable for more than 1 minute."
          runbook_url: "https://wiki.internal/runbooks/service-down"

      - alert: HighErrorRate
        expr: |
          (
            sum by (job) (rate(http_server_requests_seconds_count{status=~"5.."}[5m]))
            /
            sum by (job) (rate(http_server_requests_seconds_count[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "High 5xx error rate on {{ $labels.job }}"
          description: "{{ $labels.job }} has a 5xx error rate of {{ $value | humanizePercentage }} over the last 5 minutes."

      - alert: HighLatencyP99
        expr: |
          histogram_quantile(0.99,
            sum by (job, le) (rate(http_server_requests_seconds_bucket[5m]))
          ) > 2
        for: 5m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "P99 latency above 2s on {{ $labels.job }}"
          description: "{{ $labels.job }} P99 latency is {{ $value | humanizeDuration }}."

      - alert: PodRestart
        expr: increase(process_start_time_seconds[15m]) > 1
        for: 0m
        labels:
          severity: warning
          team: platform
        annotations:
          summary: "{{ $labels.job }} has restarted"
          description: "Service {{ $labels.job }} (instance {{ $labels.instance }}) restarted in the last 15 minutes."
