global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - /etc/prometheus/alerts/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: saas-core
    metrics_path: /actuator/prometheus
    scrape_interval: 10s
    static_configs:
      - targets: ['saas-core:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: saas-core

  - job_name: orders-api
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ['orders-api:3000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: orders-api

  - job_name: payments-api
    metrics_path: /metrics
    scrape_interval: 10s
    static_configs:
      - targets: ['payments-api:8000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: payments-api

  - job_name: rabbitmq
    static_configs:
      - targets: ['rabbitmq:15692']

  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: nginx
    static_configs:
      - targets: ['nginx-exporter:9113']

  - job_name: node-exporter
    static_configs:
      - targets: ['node-exporter:9100']
