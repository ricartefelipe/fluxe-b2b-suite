# Não executado pelo GitHub: ficheiros em subpastas não são workflows ativos.
# CI oficial do monorepo: fluxe-b2b-suite/.github/workflows/deploy.yml (raiz do repositório).
name: CI (não usado — ver deploy.yml na raiz)

on:
  push:
    branches:
      - master
      - develop
  pull_request:

permissions:
  actions: read
  contents: read

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      # Nx Cloud: distribui lint/test/build/typecheck; E2E fica sequencial (porta 4200 partilhada)
      - run: pnpm nx start-ci-run --distribute-on="3 linux-medium-js" --stop-agents-after="typecheck"

      # Browser + deps do SO (Ubuntu runner), alinhado a deploy.yml — evita falhas intermitentes do E2E
      - run: pnpm exec playwright install --with-deps chromium

      - run: pnpm nx record -- echo Hello World
      - run: pnpm nx run-many -t lint test build typecheck
      - run: CI=true pnpm nx run-many -t e2e --projects=admin-console-e2e,ops-portal-e2e,shop-e2e --parallel=1

      - run: pnpm nx fix-ci
        if: always()
