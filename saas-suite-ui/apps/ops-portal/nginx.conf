server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /assets/config.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }

    location /assets/ {
        expires 1d;
        add_header Cache-Control "public, immutable";
    }
}
