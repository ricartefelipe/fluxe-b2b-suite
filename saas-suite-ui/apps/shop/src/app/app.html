<shop-offline-indicator />

<header class="app-header" role="banner">
  <div class="container">
    <a routerLink="/" class="brand" aria-label="Home">
      <h1>{{ title }}</h1>
    </a>
    <nav role="navigation" aria-label="Main navigation">
      <a routerLink="/products" routerLinkActive="active">Products</a>
      <a routerLink="/orders" routerLinkActive="active">My Orders</a>
      <a routerLink="/checkout" routerLinkActive="active" class="cart-link" aria-label="Shopping cart">
        <mat-icon
          [matBadge]="cart.totalItems() || null"
          matBadgeColor="warn"
          matBadgeSize="small"
          [matBadgeHidden]="cart.totalItems() === 0"
          aria-hidden="true"
        >shopping_cart</mat-icon>
        Cart
      </a>
    </nav>
    <div class="header-actions">
      <ui-theme-toggle />
      <saas-language-switcher />
    </div>
  </div>
</header>

<main id="main-content" class="app-main" role="main">
  <router-outlet></router-outlet>
</main>

<footer class="app-footer" role="contentinfo">
  <div class="container">
    <p>&copy; 2026 Fluxe B2B Suite</p>
    <p>Multi-tenant B2B Platform</p>
  </div>
</footer>

<shop-install-prompt />
