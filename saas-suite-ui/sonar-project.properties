# SonarCloud — saas-suite-ui (Nx/Angular monorepo)
# Criar projeto em https://sonarcloud.io e definir SONAR_TOKEN no GitHub (Settings → Secrets)
sonar.organization=
sonar.projectKey=

sonar.sources=apps,libs
sonar.exclusions=**/node_modules/**,**/dist/,**/.nx/,**/coverage/,**/*.spec.ts,**/*.test.ts,**/test-setup.ts,**/jest.config.*,**/vite.config.*,**/project.json

sonar.sourceEncoding=UTF-8
sonar.typescript.node.maxspace=4096

# Cobertura (opcional): descomente após configurar testes com lcov
# sonar.typescript.lcov.reportPaths=coverage/lcov.info
